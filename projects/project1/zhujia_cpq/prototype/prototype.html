<!DOCTYPE html>
<html lang="zh-CN" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>家装初步报价预估</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Noto Sans SC"', 'sans-serif'],
                        serif: ['"Noto Serif SC"', 'serif'],
                    },
                    colors: {
                        stone: {
                            50: '#F9F8F6',
                            100: '#F2EFE9',
                            800: '#2C2A29',
                            900: '#1A1918',
                        },
                        gold: {
                            600: '#A38F72',
                            700: '#8C7A5E',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.5s ease-out forwards',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #e5e5e5;
            -webkit-tap-highlight-color: transparent;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #F9F8F6;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.05);
            overflow-x: hidden;
        }
        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
        .glass-nav {
            background: rgba(249, 248, 246, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
</head>
<body class="text-stone-800 antialiased no-scrollbar h-screen overflow-y-auto">

<div class="app-container" id="app"></div>

<script>
    // --- Data & Logic ---
    const materialsData = [
        {
            category: '基装',
            items: [
                { id: 'jizhuang', name: '全屋基装', type: 'area', desc: '按建筑面积预估平米数', options: [
                    { name: '¥398', price: 398 },
                    { name: '¥428', price: 428 }
                ]}
            ]
        },
        {
            category: '主材',
            items: [
                { id: 'door_wood', name: '室内木门', type: 'door', desc: '默认按面积推算，也可手动输入樘数', customInput: { label: '修改樘数', unit: '樘', defaultVal: '' }, options: [
                    { name: '¥1080', price: 1080 },
                    { name: '¥1380', price: 1380 },
                    { name: '¥1880', price: 1880 }
                ]},
                { id: 'door_metal', name: '厨卫金属门', type: 'metal_door', desc: '按建筑面积预估平米数', options: [
                    { name: '¥780', price: 780 },
                    { name: '¥1080', price: 1080 },
                    { name: '¥1380', price: 1380 }
                ]},
                { id: 'tile', name: '全屋通铺瓷砖', type: 'tile_complex', desc: '先选规格，再选价位。按建筑面积预估片数(含损耗)', sizes: [
                    { name: '400x800', size: 0.32, prices: [12, 20, 28] },
                    { name: '800x800', size: 0.64, prices: [45, 58, 68] },
                    { name: '750x1500', size: 1.125, prices: [98, 128, 158] }
                ]},
                { id: 'ceiling', name: '厨卫集成吊顶', type: 'kitchen_bath', desc: '默认按面积推算，也可手动输入面积', customInput: { label: '修改面积', unit: '㎡', defaultVal: '' }, options: [
                    { name: '¥198', price: 198 },
                    { name: '¥368', price: 368 }
                ]},
                { id: 'wall', name: '墙面饰材', type: 'wall', desc: '按建筑面积预估墙面展开面积', options: [
                    { name: '¥10', price: 10 },
                    { name: '¥40', price: 40 },
                    { name: '¥70', price: 70 }
                ]}
            ]
        },
        {
            category: '定制',
            items: [
                { id: 'cabinet_custom', name: '全屋定制柜', type: 'cabinet', desc: '按建筑面积预估平米数', options: [
                    { name: '¥780', price: 780 },
                    { name: '¥880', price: 880 },
                    { name: '¥980', price: 980 },
                    { name: '¥1180', price: 1180 },
                    { name: '¥1380', price: 1380 }
                ]},
                { id: 'kitchen_cabinet', name: '整体橱柜', type: 'kitchen_cab', desc: '按建筑面积预估延米数', options: [
                    { name: '¥1280', price: 1280 },
                    { name: '¥1580', price: 1580 },
                    { name: '¥1980', price: 1980 }
                ]}
            ]
        },
        {
            category: '个性化',
            items: [
                { id: 'tv_wall', name: '电视背景墙', type: 'fixed', desc: '按项计费', options: [
                    { name: '¥2000', price: 2000 },
                    { name: '¥4000', price: 4000 },
                    { name: '¥6000', price: 6000 }
                ]},
                { id: 'wood_veneer', name: '墙面木饰面', type: 'veneer', desc: '按建筑面积预估平米数', options: [
                    { name: '¥198', price: 198 },
                    { name: '¥328', price: 328 },
                    { name: '¥428', price: 428 }
                ]},
                { id: 'skirting', name: '全屋踢脚线', type: 'skirting', desc: '按建筑面积预估米数', options: [
                    { name: '¥13', price: 13 },
                    { name: '¥25', price: 25 },
                    { name: '¥38', price: 38 }
                ]}
            ]
        }
    ];

    // State
    let state = {
        view: 'home', 
        area: '',
        activeTab: '基装',
        selections: {}, // e.g. { jizhuang: 0, tile_size: 1, tile_price: 2 }
        customValues: {}, // e.g. { door_wood: 5, ceiling: 10 }
        isModalOpen: false,
        phone: ''
    };

    // Core Calculation Logic
    function calculatePrice() {
        let total = 0;
        const S = parseFloat(state.area) || 0;
        let breakdown = [];

        materialsData.forEach(cat => {
            cat.items.forEach(item => {
                if (item.type === 'tile_complex') {
                    if (state.selections.tile_size !== undefined && state.selections.tile_price !== undefined) {
                        const sIdx = state.selections.tile_size;
                        const pIdx = state.selections.tile_price;
                        const sizeObj = item.sizes[sIdx];
                        const price = sizeObj.prices[pIdx];
                        
                        let tiles = ((S * 0.7) / sizeObj.size) * 1.07;
                        let itemTotal = tiles * price;
                        
                        total += itemTotal;
                        breakdown.push({
                            name: item.name,
                            optName: `${sizeObj.name} · ¥${price}`,
                            unitPrice: price,
                            total: itemTotal,
                            unitStr: `${Math.ceil(tiles)} 片`
                        });
                    }
                } else {
                    const optIdx = state.selections[item.id];
                    if (optIdx !== undefined) {
                        const opt = item.options[optIdx];
                        let itemTotal = 0;
                        let unitStr = '';
                        
                        // Check if there is a custom value for this item
                        const hasCustomValue = state.customValues[item.id] && state.customValues[item.id] !== '';
                        const customValNum = hasCustomValue ? parseFloat(state.customValues[item.id]) : 0;

                        switch(item.type) {
                            case 'area':
                                itemTotal = S * opt.price; unitStr = `${S} ㎡`; break;
                            case 'door':
                                let doors = hasCustomValue ? customValNum : (Math.round(S / 40) || 1);
                                itemTotal = doors * opt.price; unitStr = `${doors} 樘`; break;
                            case 'metal_door':
                                let mArea = S * 0.02;
                                itemTotal = mArea * opt.price; unitStr = `${mArea.toFixed(1)} ㎡`; break;
                            case 'kitchen_bath':
                                let kbArea = hasCustomValue ? customValNum : (S * 0.09);
                                itemTotal = kbArea * opt.price; unitStr = `${kbArea.toFixed(1)} ㎡`; break;
                            case 'wall':
                                let wArea = S * 1.8;
                                itemTotal = wArea * opt.price; unitStr = `${wArea.toFixed(1)} ㎡`; break;
                            case 'cabinet':
                                let cArea = S * 0.25;
                                itemTotal = cArea * opt.price; unitStr = `${cArea.toFixed(1)} ㎡`; break;
                            case 'kitchen_cab':
                                let kLen = S * 0.04;
                                itemTotal = kLen * opt.price; unitStr = `${kLen.toFixed(1)} m`; break;
                            case 'fixed':
                                itemTotal = opt.price; unitStr = `1 项`; break;
                            case 'veneer':
                                let vArea = S * 0.09;
                                itemTotal = vArea * opt.price; unitStr = `${vArea.toFixed(1)} ㎡`; break;
                            case 'skirting':
                                let sLen = S * 0.8;
                                itemTotal = sLen * opt.price; unitStr = `${sLen.toFixed(1)} m`; break;
                        }
                        
                        total += itemTotal;
                        breakdown.push({
                            name: item.name,
                            optName: opt.name,
                            unitPrice: opt.price,
                            total: itemTotal,
                            unitStr: unitStr
                        });
                    }
                }
            });
        });

        return {
            exact: total,
            min: Math.floor((total * 0.9) / 1000) * 1000,
            max: Math.ceil((total * 1.1) / 1000) * 1000,
            breakdown: breakdown
        };
    }

    function formatCurrency(num) {
        return num.toLocaleString('zh-CN', { maximumFractionDigits: 0 });
    }

    // --- DOM Actions ---
    // Handling input via vanilla DOM manipulation to avoid re-rendering whole view
    function handleAreaInput(val) {
        state.area = val;
        const btn = document.getElementById('startBtn');
        if (val > 0) {
            btn.classList.remove('opacity-50', 'pointer-events-none');
            btn.classList.add('opacity-100');
        } else {
            btn.classList.add('opacity-50', 'pointer-events-none');
            btn.classList.remove('opacity-100');
        }
    }

    function handlePhoneInput(val) {
        state.phone = val;
        const btn = document.getElementById('unlockBtn');
        if (val.length >= 11) {
            btn.classList.remove('opacity-50', 'pointer-events-none');
            btn.classList.add('opacity-100');
        } else {
            btn.classList.add('opacity-50', 'pointer-events-none');
            btn.classList.remove('opacity-100');
        }
    }

    function handleCustomInput(itemId, val) {
        state.customValues[itemId] = val;
        // 因为在 oninput 中如果直接 render() 会导致输入框失去焦点，
        // 所以我们只更新底部价格的 DOM，而不重新渲染整个列表
        updatePriceFooter();
    }

    function updatePriceFooter() {
        const price = calculatePrice();
        const footerPriceEl = document.getElementById('footer-price');
        if (footerPriceEl) {
            if (price.min > 0) {
                footerPriceEl.innerHTML = `¥${formatCurrency(price.min)} <span class="text-stone-400 font-sans text-lg font-normal">-</span> ¥${formatCurrency(price.max)}`;
            } else {
                footerPriceEl.innerHTML = '<span class="text-lg text-stone-400 font-sans">请选择材料</span>';
            }
        }
    }

    function goSelection() { 
        if(state.area > 0) {
            state.view = 'selection';
            window.scrollTo(0,0);
            render();
        }
    }

    function setTab(tab) { 
        state.activeTab = tab; 
        render(); 
    }

    function toggleSelection(itemId, idx) { 
        if (state.selections[itemId] === idx) {
            delete state.selections[itemId]; // Unselect if already selected
        } else {
            state.selections[itemId] = idx;
        }
        render(); 
    }

    function toggleTileSize(sIdx) {
        if (state.selections.tile_size === sIdx) {
            delete state.selections.tile_size;
            delete state.selections.tile_price;
        } else {
            state.selections.tile_size = sIdx;
            delete state.selections.tile_price; // Reset price when size changes
        }
        render();
    }

    function toggleTilePrice(pIdx) {
        if (state.selections.tile_price === pIdx) {
            delete state.selections.tile_price;
        } else {
            state.selections.tile_price = pIdx;
        }
        render();
    }

    function toggleModal(show) { 
        state.isModalOpen = show; 
        render(); 
    }

    async function submitLead() {
        if(state.phone.length >= 11) {
            const btn = document.getElementById('unlockBtn');
            const originalText = btn.innerHTML;
            btn.innerHTML = '正在解锁并生成清单...';
            btn.classList.add('opacity-50', 'pointer-events-none');

            try {
                const priceData = calculatePrice();
                // 调用云端接口同步飞书 (请确保该路径与腾讯云HTTP触发路径一致)
                await fetch('https://pnzj1-8g1jk6h68b866dd9-1412858475.ap-shanghai.app.tcloudbase.com/api/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: state.phone,
                        area: state.area,
                        exactPrice: priceData.exact,
                        breakdown: priceData.breakdown
                    })
                });
            } catch (err) {
                console.error('同步飞书失败，可能是后端未启动', err);
            }

            state.isModalOpen = false;
            state.view = 'result';
            window.scrollTo(0,0);
            render();
        }
    }

    function resetFlow() {
        state = {
            view: 'home', 
            area: '',
            activeTab: '基装',
            selections: {}, 
            customValues: {},
            isModalOpen: false,
            phone: ''
        };
        render();
    }

    async function saveAsImage() {
        const btn = document.getElementById('saveImgBtn');
        const originalText = btn.innerHTML;
        btn.innerHTML = '正在生成...';
        btn.classList.add('opacity-50', 'pointer-events-none');

        try {
            // Select the area to capture (exclude the bottom action buttons)
            const captureArea = document.getElementById('receipt-area');
            const canvas = await html2canvas(captureArea, {
                scale: 2, // High resolution
                useCORS: true,
                backgroundColor: '#F9F8F6'
            });
            
            // Create a temporary link to download the image
            const link = document.createElement('a');
            link.download = `品诺筑家_精确报价单_${state.area}平.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            
        } catch (error) {
            console.error('保存图片失败:', error);
            alert('保存图片失败，请稍后重试');
        } finally {
            btn.innerHTML = originalText;
            btn.classList.remove('opacity-50', 'pointer-events-none');
        }
    }

    // --- Renderers ---
    function renderHome() {
        return `
            <div class="flex flex-col min-h-screen px-6 py-12 animate-fade-in">
                <div class="flex-1 flex flex-col justify-center">
                    <div class="mb-4">
                        <span class="inline-block px-3 py-1 bg-stone-200 text-stone-600 text-xs font-medium tracking-widest rounded-full mb-6 uppercase">品诺筑家</span>
                    </div>
                    <h1 class="font-serif text-3xl leading-tight text-stone-900 mb-4">
                        品诺筑家智能报价系统
                    </h1>
                    <p class="text-stone-500 mb-12 text-sm leading-relaxed">
                        内置行业标准换算公式。拒绝装修被坑，提前摸清真实底价！
                    </p>
                    
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-semibold text-stone-400 uppercase tracking-wider mb-2">建筑面积 (㎡)</label>
                            <div class="relative">
                                <input type="number" id="areaInput" value="${state.area}" oninput="handleAreaInput(this.value)" placeholder="输入您的房屋面积" 
                                    class="w-full bg-white border-b-2 border-stone-200 py-4 text-3xl font-serif text-stone-800 placeholder-stone-300 focus:outline-none focus:border-stone-800 transition-colors bg-transparent">
                            </div>
                        </div>
                        
                        <button id="startBtn" onclick="goSelection()" class="w-full bg-stone-900 text-white py-4 mt-8 rounded-none font-medium tracking-wide flex items-center justify-center space-x-2 ${state.area > 0 ? 'opacity-100' : 'opacity-50 pointer-events-none'} transition-opacity">
                            <span>开启定制计算</span>
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                        </button>
                    </div>
                </div>
                <div class="mt-auto pt-12 text-center text-xs text-stone-400">
                    品诺有心，筑家有道
                </div>
            </div>
        `;
    }

    function renderSelection() {
        const price = calculatePrice();
        
        const tabsHtml = materialsData.map(cat => `
            <button onclick="setTab('${cat.category}')" 
                class="px-5 py-4 whitespace-nowrap text-sm font-medium border-b-2 transition-colors
                ${state.activeTab === cat.category ? 'border-stone-900 text-stone-900' : 'border-transparent text-stone-400'}">
                ${cat.category}
            </button>
        `).join('');

        const activeCat = materialsData.find(c => c.category === state.activeTab);
        const itemsHtml = activeCat.items.map(item => {
            if (item.type === 'tile_complex') {
                return `
                    <div class="bg-white p-5 mb-4 shadow-sm border border-stone-100 transition-all duration-300">
                        <div class="flex justify-between items-start mb-4">
                            <div>
                                <h3 class="font-serif font-semibold text-lg text-stone-800">${item.name}</h3>
                                ${item.desc ? `<p class="text-xs text-stone-400 mt-1">${item.desc}</p>` : ''}
                            </div>
                        </div>
                        <div class="mb-3">
                            <div class="text-xs text-stone-400 mb-2">① 选择规格</div>
                            <div class="flex flex-wrap gap-2">
                                ${item.sizes.map((s, sIdx) => `
                                    <div onclick="toggleTileSize(${sIdx})" 
                                        class="cursor-pointer px-4 py-2 border text-sm transition-all duration-150 flex items-center justify-center rounded-sm
                                        ${state.selections.tile_size === sIdx ? 'bg-stone-800 text-white border-stone-800' : 'border-stone-200 text-stone-600 bg-white'}">
                                        ${s.name}
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="h-[80px] transition-all duration-300 overflow-hidden ${state.selections.tile_size !== undefined ? 'opacity-100 max-h-40' : 'opacity-0 max-h-0'}">
                            ${state.selections.tile_size !== undefined ? `
                            <div class="pt-3 border-t border-stone-100 mt-3 animate-fade-in">
                                <div class="text-xs text-stone-400 mb-2">② 选择价位 (可再次点击取消)</div>
                                <div class="flex flex-wrap gap-2">
                                    ${item.sizes[state.selections.tile_size].prices.map((p, pIdx) => `
                                        <div onclick="toggleTilePrice(${pIdx})" 
                                            class="cursor-pointer px-4 py-2 border text-sm transition-all duration-150 flex items-center justify-center rounded-sm
                                            ${state.selections.tile_price === pIdx ? 'bg-stone-800 text-white border-stone-800' : 'border-stone-200 text-stone-600 bg-white'}">
                                            ¥${p}
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                            ` : ''}
                        </div>
                    </div>
                `;
            } else {
                return `
                    <div class="bg-white p-4 sm:p-5 mb-4 shadow-sm border border-stone-100 transition-all duration-300">
                        <div class="flex flex-col mb-4 gap-2">
                            <div>
                                <h3 class="font-serif font-semibold text-lg text-stone-800">${item.name}</h3>
                                ${item.desc ? `<p class="text-xs text-stone-400 mt-1">${item.desc}</p>` : ''}
                            </div>
                            <div class="transition-all duration-300 overflow-hidden ${item.customInput && state.selections[item.id] !== undefined ? 'opacity-100 h-[38px] mt-1' : 'opacity-0 h-0'}">
                                ${item.customInput ? `
                                <div class="flex items-center gap-2 bg-stone-50 px-3 py-1.5 rounded border border-stone-200 w-fit">
                                    <span class="text-xs text-stone-500 whitespace-nowrap">${item.customInput.label}:</span>
                                    <input type="number" 
                                        class="w-16 text-center text-sm font-medium border-b border-stone-300 focus:border-stone-800 focus:outline-none py-0.5 bg-transparent" 
                                        placeholder="默认" 
                                        value="${state.customValues[item.id] || ''}" 
                                        oninput="handleCustomInput('${item.id}', this.value)">
                                    <span class="text-xs text-stone-500 whitespace-nowrap">${item.customInput.unit}</span>
                                </div>
                                ` : ''}
                            </div>
                        </div>
                        <div class="flex flex-wrap gap-2">
                            ${item.options.map((opt, idx) => `
                                <div onclick="toggleSelection('${item.id}', ${idx})" 
                                    class="cursor-pointer px-4 py-2 border text-sm transition-all duration-150 flex flex-col items-center justify-center gap-1 rounded-sm
                                    ${state.selections[item.id] === idx ? 'bg-stone-800 text-white border-stone-800' : 'border-stone-200 text-stone-600 bg-white'}">
                                    <span>${opt.name}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
        }).join('');

        return `
            <div class="pb-56 bg-stone-50 min-h-screen">
                <!-- Header -->
                <div class="sticky top-0 z-10 glass-nav border-b border-stone-200">
                    <div class="px-4 py-3 flex items-center justify-between">
                        <div class="text-sm font-medium text-stone-500">已选面积：<span class="text-stone-900 font-serif">${state.area} ㎡</span></div>
                        <button onclick="state.view='home';render()" class="text-xs text-stone-400 underline">修改面积</button>
                    </div>
                    <div class="flex overflow-x-auto no-scrollbar">
                        ${tabsHtml}
                    </div>
                </div>

                <!-- Content -->
                <div class="p-3 sm:p-4">
                    ${itemsHtml}
                </div>

                <!-- Floating Footer -->
                <div class="fixed bottom-0 w-full max-w-[480px] glass-nav border-t border-stone-200 p-4 pb-6 sm:pb-8 z-20 shadow-[0_-10px_20px_rgba(0,0,0,0.03)]">
                    <div class="flex justify-between items-end mb-4">
                        <div>
                            <div class="text-xs text-stone-500 mb-1">当前预估总价区间</div>
                            <div id="footer-price" class="font-serif text-2xl font-bold text-stone-900 transition-all">
                                ${price.min > 0 ? `¥${formatCurrency(price.min)} <span class="text-stone-400 font-sans text-lg font-normal">-</span> ¥${formatCurrency(price.max)}` : '<span class="text-lg text-stone-400 font-sans">请选择材料</span>'}
                            </div>
                        </div>
                    </div>
                    <button onclick="toggleModal(true)" class="w-full bg-gold-700 text-white py-4 font-medium tracking-wider shadow-lg shadow-gold-700/20 active:scale-[0.98] transition-transform text-sm sm:text-base">
                        查看初步预估详细清单
                    </button>
                </div>

                <!-- Modal Overlay -->
                ${state.isModalOpen ? `
                    <div class="fixed inset-0 bg-stone-900/60 z-50 flex items-end sm:items-center justify-center animate-fade-in backdrop-blur-sm">
                        <div class="bg-white w-full max-w-[480px] p-8 sm:rounded-none rounded-t-2xl relative">
                            <button onclick="toggleModal(false)" class="absolute top-4 right-4 text-stone-400 p-2">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                            </button>
                            <h2 class="font-serif text-2xl font-bold text-stone-900 mb-2">最后一步</h2>
                            <p class="text-stone-500 text-sm mb-8">为您生成专属的材料明细与人工报价单，输入手机号立即解锁隐藏明细。</p>
                            
                            <input type="tel" id="phoneInput" value="${state.phone}" oninput="handlePhoneInput(this.value)" placeholder="请输入手机号码" maxlength="11"
                                class="w-full bg-stone-50 border border-stone-200 px-4 py-4 mb-6 focus:outline-none focus:border-gold-600 focus:bg-white transition-colors">
                            
                            <button id="unlockBtn" onclick="submitLead()" class="w-full bg-stone-900 text-white py-4 font-medium ${state.phone.length >= 11 ? 'opacity-100' : 'opacity-50 pointer-events-none'} transition-opacity">
                                立即解锁完整清单
                            </button>
                            <div class="text-center mt-4 text-[10px] text-stone-400">
                                您的信息将严格保密，仅用于下发报价清单
                            </div>
                        </div>
                    </div>
                ` : ''}
            </div>
        `;
    }

    function renderResult() {
        const price = calculatePrice();
        
        const listHtml = price.breakdown.map(item => `
            <div class="flex justify-between items-center py-5 border-b border-stone-100 last:border-0">
                <div class="flex-1 pr-4">
                    <div class="font-medium text-stone-800 text-base">${item.name}</div>
                    <div class="text-sm text-stone-400 mt-1.5">${item.optName}</div>
                </div>
                <div class="text-right">
                    <div class="font-serif font-bold text-stone-900 text-lg">¥${formatCurrency(item.total)}</div>
                    <div class="text-sm text-stone-400 mt-1.5">预估用量: ${item.unitStr}</div>
                </div>
            </div>
        `).join('');

        return `
            <div class="min-h-screen bg-stone-50 pb-24 animate-fade-in">
                <!-- Wrapper for html2canvas to capture -->
                <div id="receipt-area" class="bg-stone-50 pb-4">
                    <!-- Header -->
                    <div class="bg-gold-700 text-white p-6 sm:p-8 pt-10 sm:pt-12 rounded-b-3xl shadow-lg relative overflow-hidden">
                        <div class="absolute -right-10 -top-10 w-40 h-40 bg-white/10 rounded-full blur-2xl"></div>
                        <div class="text-xs font-medium text-gold-100 mb-2 tracking-widest uppercase">品诺筑家 · 初步预估报价单</div>
                        <div class="text-white/80 text-sm mb-4">建筑面积 ${state.area} ㎡</div>
                        <div class="text-sm text-gold-100 mb-1">预估总价参考</div>
                        <div class="font-serif text-3xl sm:text-4xl font-bold text-white mb-2">¥${formatCurrency(price.exact)}</div>
                        <p class="text-xs text-gold-100/80 mt-4 leading-relaxed">
                            *此清单基于您的户型面积及所选配置科学推算，已包含足额工程量。每个家都独一无二，我们期待为您实地量房，出具1:1的精准施工明细。
                        </p>
                    </div>

                    <!-- Detailed List -->
                    <div class="p-4 -mt-4 relative z-10">
                        <div class="bg-white p-5 shadow-sm border border-stone-100 rounded-sm">
                            <div class="flex items-center justify-between mb-4 pb-4 border-b border-stone-100">
                                <h3 class="font-serif font-bold text-stone-800">材料与人工明细</h3>
                            </div>
                            ${listHtml}
                        </div>
                    </div>

                    <!-- Contact Box with Double QR Codes -->
                    <div class="p-4 mt-2">
                        <div class="bg-white p-6 border border-stone-100 text-center flex flex-col items-center rounded-sm shadow-sm">
                            <h4 class="font-serif font-bold text-stone-800 mb-2">获取设计方案</h4>
                            <p class="text-xs text-stone-500 mb-6">您的专属顾问已收到您的报价需求<br>添加微信或关注抖音了解更多</p>
                            
                            <div class="flex gap-8 justify-center w-full mb-2">
                                <!-- Wechat -->
                                <div class="flex flex-col items-center">
                                    <div class="w-24 h-24 bg-stone-50 p-1 border border-stone-200 mb-3 shadow-sm relative overflow-hidden">
                                        <div class="absolute inset-0 flex items-center justify-center text-stone-300 text-xs">替换微信二维码</div>
                                        <img src="wechat_qr.jpg" alt="微信二维码" class="w-full h-full object-cover relative z-10" onerror="this.style.opacity='0'" />
                                    </div>
                                    <div class="text-xs font-medium text-stone-600">扫码加微信</div>
                                </div>
                                <!-- Douyin -->
                                <div class="flex flex-col items-center">
                                    <div class="w-24 h-24 bg-stone-50 p-1 border border-stone-200 mb-3 shadow-sm relative overflow-hidden">
                                        <div class="absolute inset-0 flex items-center justify-center text-stone-300 text-xs">替换抖音二维码</div>
                                        <img src="douyin_qr.jpg" alt="抖音二维码" class="w-full h-full object-cover relative z-10" onerror="this.style.opacity='0'" />
                                    </div>
                                    <div class="text-xs font-medium text-stone-600">关注抖音号</div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Action Buttons (Not captured in image) -->
                <div class="fixed bottom-0 w-full max-w-[480px] glass-nav border-t border-stone-200 p-4 z-20 shadow-[0_-10px_20px_rgba(0,0,0,0.03)] flex gap-3">
                    <button onclick="resetFlow()" class="flex-1 bg-white border border-stone-300 text-stone-700 py-3.5 font-medium tracking-wide shadow-sm active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        重新测算
                    </button>
                    <button id="saveImgBtn" onclick="saveAsImage()" class="flex-1 bg-stone-900 text-white py-3.5 font-medium tracking-wide shadow-lg active:scale-[0.98] transition-transform flex justify-center items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                        保存为图片
                    </button>
                </div>
            </div>
        `;
    }

    function render() {
        const app = document.getElementById('app');
        if(state.view === 'home') app.innerHTML = renderHome();
        else if(state.view === 'selection') app.innerHTML = renderSelection();
        else if(state.view === 'result') app.innerHTML = renderResult();
    }

    // Init
    const urlParams = new URLSearchParams(window.location.search);
    const viewParam = urlParams.get('view');
    if (viewParam) {
        state.view = viewParam;
        if (viewParam === 'selection') {
            state.area = 100; // Mock data for preview
        } else if (viewParam === 'result') {
            state.area = 100;
            state.phone = '13800138000';
            // Mock some selections
            state.selections = { jizhuang: 0, door_wood: 1, tile_size: 1, tile_price: 1 };
        }
    }
    render();
</script>
</body>
</html>
